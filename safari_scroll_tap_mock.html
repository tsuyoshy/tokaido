
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#mock-frame {
  width: 375px;
  margin: 1rem auto;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#mock-viewport {
  height: 600px;
  overflow: hidden;
  position: relative;
  background: #0a0900;
  font-family: 'Noto Serif JP', Georgia, serif;
  color: #e8d880;
  display: flex;
  flex-direction: column;
}
#mock-header {
  background: #0a0900;
  border-bottom: 1px solid rgba(200,160,40,.28);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  flex-shrink: 0;
}
#mock-scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}
#mock-scroll-area p {
  font-size: 14px;
  line-height: 2.0;
  margin-bottom: 16px;
}
#mock-tap-hint {
  display: none;
  text-align: center;
  padding: 8px;
  color: rgba(232,216,128,0.85);
  font-size: 12px;
  letter-spacing: 0.15em;
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%,100%{opacity:0.4} 50%{opacity:1}
}
#mock-choices { padding: 0 16px 16px; }
.mock-choice-btn {
  display: block; width: 100%;
  background: rgba(200,160,40,.08);
  border: 1px solid rgba(200,160,40,.3);
  color: #e8d880;
  padding: 10px 16px;
  margin-bottom: 8px;
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
}
.mock-choice-btn:active { background: rgba(200,160,40,.2); }

#controls {
  padding: 1rem;
  border-top: 0.5px solid var(--color-border-tertiary);
  background: var(--color-background-primary);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ctrl-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 2px;
}
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  color: var(--color-text-secondary);
}
.badge.ok { background: #e6f5ec; color: #2e7d32; border-color: #a5d6a7; }
.badge.ng { background: #fce8e8; color: #c62828; border-color: #ef9a9a; }
select, input[type=checkbox] { accent-color: #888; }
#log {
  font-size: 11px;
  color: var(--color-text-secondary);
  background: var(--color-background-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 8px;
  height: 72px;
  overflow-y: auto;
  font-family: var(--font-mono);
}
</style>

<div id="mock-frame">
  <div id="mock-viewport">
    <div id="mock-header">
      <span style="font-size:11px;letter-spacing:.1em">東海道商い旅</span>
      <div style="display:flex;gap:8px;font-size:11px">
        <span>1日</span><span>100文</span><span>朝</span>
      </div>
    </div>
    <div id="mock-scroll-area">
      <p id="scene-text">品川の宿場に着いた。江戸の町の喧騒から少し離れ、旅人たちが行き交う通りに立つ。魚売りの声、馬の嘶き、下駄の音が混じり合う。</p>
    </div>
    <div id="mock-tap-hint">— タップして続ける —</div>
    <div id="mock-choices"></div>
  </div>

  <div id="controls">
    <div class="ctrl-label">テスト条件</div>
    <div class="ctrl-row">
      <span style="font-size:12px;color:var(--color-text-primary)">body の overflow-x</span>
      <select id="sel-overflow" style="font-size:12px;padding:3px 6px">
        <option value="hidden">hidden（現状）</option>
        <option value="clip">clip</option>
        <option value="visible">visible（修正案）</option>
      </select>
    </div>
    <div class="ctrl-row">
      <span style="font-size:12px;color:var(--color-text-primary)">max-width の付与先</span>
      <select id="sel-maxwidth" style="font-size:12px;padding:3px 6px">
        <option value="body">body（現状）</option>
        <option value="html">html（修正案）</option>
        <option value="wrapper">wrapper div</option>
      </select>
    </div>
    <div class="ctrl-row">
      <span style="font-size:12px;color:var(--color-text-primary)">tap-hint の pointer-events</span>
      <select id="sel-pe" style="font-size:12px;padding:3px 6px">
        <option value="none">none（現状）</option>
        <option value="auto">auto（修正案）</option>
      </select>
    </div>
    <div class="ctrl-row">
      <span style="font-size:12px;color:var(--color-text-primary)">body の click handler</span>
      <select id="sel-handler" style="font-size:12px;padding:3px 6px">
        <option value="body">body（現状）</option>
        <option value="element">hint要素（修正案）</option>
      </select>
    </div>
    <div class="ctrl-row" style="flex-wrap:wrap;gap:6px">
      <span id="badge-scroll" class="badge ng">スクロール ✗</span>
      <span id="badge-tap" class="badge ng">テキスト進行 ✗</span>
      <span id="badge-choice" class="badge ng">選択肢 ✗</span>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
const scrollArea = document.getElementById('mock-scroll-area');
const tapHint = document.getElementById('mock-tap-hint');
const choicesEl = document.getElementById('mock-choices');
const selOverflow = document.getElementById('sel-overflow');
const selMaxwidth = document.getElementById('sel-maxwidth');
const selPe = document.getElementById('sel-pe');
const selHandler = document.getElementById('sel-handler');
const badgeScroll = document.getElementById('badge-scroll');
const badgeTap = document.getElementById('badge-tap');
const badgeChoice = document.getElementById('badge-choice');
const logEl = document.getElementById('log');

const scenes = [
  { type: 'tap', text: '旅籠の亭主が声をかけてきた。「お客さん、今夜は泊まっていきますか？ちょうど一部屋空いておりますが。品川は江戸の入り口、旅の始まりにはちょうどよい場所でございますよ。」' },
  { type: 'choice', text: '亭主の言葉に、どう答えるか。', choices: ['今夜は泊まる（200文）', 'まだ進む', '値段を交渉する'] },
  { type: 'tap', text: '空は高く晴れ渡り、富士の頂が遠く白く輝いている。東海道の旅は長い。まずは一歩、足を踏み出すのみだ。' },
  { type: 'choice', text: '次の宿場まで、どう行くか。', choices: ['歩いて川崎へ向かう', '馬を借りる（50文）'] },
];
let sceneIdx = 0;
let scrolled = false;
let tapped = false;
let chosen = false;

function log(msg) {
  const d = new Date();
  const t = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
  logEl.innerHTML += `<div>[${t}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function updateBadge(el, ok, label) {
  el.textContent = label + (ok ? ' ✓' : ' ✗');
  el.className = 'badge ' + (ok ? 'ok' : 'ng');
}

function applySettings() {
  const overflow = selOverflow.value;
  const pe = selPe.value;
  scrollArea.style.overflowX = overflow === 'hidden' ? 'hidden' : overflow === 'clip' ? 'clip' : 'visible';
  tapHint.style.pointerEvents = pe;
  if (pe === 'auto') tapHint.style.cursor = 'pointer';
  else tapHint.style.cursor = '';
  log(`設定変更: overflow-x=${overflow}, pointer-events=${pe}, handler=${selHandler.value}, maxwidth=${selMaxwidth.value}`);
  renderScene();
}

let _tapHandler = null;

function clearTapHandler() {
  if (_tapHandler) {
    document.getElementById('mock-viewport').removeEventListener('click', _tapHandler);
    tapHint.removeEventListener('click', _tapHandler);
    _tapHandler = null;
  }
}

function setTapHandler(fn) {
  clearTapHandler();
  _tapHandler = fn;
  if (selHandler.value === 'body') {
    document.getElementById('mock-viewport').addEventListener('click', _tapHandler);
    log('handler: viewport(body相当)にclick登録');
  } else {
    tapHint.addEventListener('click', _tapHandler);
    log('handler: hint要素にclick登録');
  }
}

function renderScene() {
  clearTapHandler();
  const scene = scenes[sceneIdx % scenes.length];
  choicesEl.innerHTML = '';
  tapHint.style.display = 'none';

  document.getElementById('scene-text').textContent = scene.text;

  if (scene.type === 'tap') {
    setTimeout(() => {
      tapHint.style.display = 'block';
      setTapHandler((e) => {
        if (selHandler.value === 'body') {
          log('viewport click発火 ✓');
        } else {
          if (!tapHint.contains(e.target)) return;
          log('hint要素 click発火 ✓');
        }
        tapped = true;
        updateBadge(badgeTap, true, 'テキスト進行');
        clearTapHandler();
        tapHint.style.display = 'none';
        sceneIdx++;
        renderScene();
      });
    }, 200);
  } else {
    scene.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'mock-choice-btn';
      btn.textContent = ['一、','二、','三、'][i] + c;
      btn.addEventListener('click', () => {
        log(`選択肢クリック: ${c} ✓`);
        chosen = true;
        updateBadge(badgeChoice, true, '選択肢');
        sceneIdx++;
        renderScene();
      });
      choicesEl.appendChild(btn);
    });
  }
}

scrollArea.addEventListener('scroll', () => {
  if (!scrolled) {
    scrolled = true;
    updateBadge(badgeScroll, true, 'スクロール');
    log('スクロール検知 ✓');
  }
});

[selOverflow, selMaxwidth, selPe, selHandler].forEach(el => {
  el.addEventListener('change', applySettings);
});

renderScene();
log('初期状態（現状設定）でテスト開始');
</script>
