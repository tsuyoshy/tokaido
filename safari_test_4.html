<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Safari検証モック</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #0a0900;
}

body {
  color: #e8d880;
  font-family: 'Hiragino Mincho ProN', Georgia, serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
  cursor: pointer;
}

#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #0a0900;
  border-bottom: 1px solid rgba(200,160,40,.28);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
}

#stage-container {
  position: sticky;
  top: 52px;
  z-index: 90;
  background: #0a0900;
}

#illus-area {
  width: 100%;
  height: 180px;
  background: #1a1600;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(200,160,40,.3);
  font-size: 13px;
  letter-spacing: .1em;
}

#scene-area {
  padding: 20px 20px 0;
  min-height: 60vh;
}

#scene-area p {
  font-size: 15px;
  line-height: 2.4;
  margin-bottom: 16px;
}

#tap-hint {
  display: none;
  text-align: center;
  margin: 28px auto 8px;
  padding: 8px 20px;
  color: rgba(232,216,128,0.85);
  font-size: 13px;
  letter-spacing: 0.15em;
  pointer-events: none;
  animation: pulse 1.8s infinite;
}
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

#choices { padding: 0 20px 40px; }
.choice-btn {
  display: block; width: 100%;
  background: rgba(200,160,40,.08);
  border: 1px solid rgba(200,160,40,.3);
  color: #e8d880;
  padding: 12px 16px;
  margin-bottom: 10px;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  -webkit-appearance: none;
}
.choice-btn:hover { background: rgba(200,160,40,.18); }

/* デバッグパネル */
#dbg {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 480px;
  margin: 0 auto;
  background: rgba(0,0,0,.85);
  border-top: 1px solid #444;
  padding: 8px 12px;
  font-family: monospace;
  font-size: 11px;
  z-index: 999;
}
#dbg-badges { display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.dbg-badge { padding: 2px 8px; border-radius: 3px; background: #2a0000; color: #f88; border: 1px solid #500; font-size: 11px; }
.dbg-badge.ok { background: #002a00; color: #8f8; border-color: #050; }
#dbg-log { color: #666; font-size: 10px; height: 36px; overflow-y: auto; }
</style>
</head>
<body>

<div id="header">
  <span style="letter-spacing:.1em;font-size:11px">東海道商い旅</span>
  <div style="display:flex;gap:10px;font-size:11px">
    <span>1日</span><span>100文</span><span>朝</span>
  </div>
</div>

<div id="stage-container">
  <div id="illus-area">［ 挿絵エリア ］</div>
</div>

<div id="scene-area">
  <p id="scene-text"></p>
</div>
<div id="tap-hint">— タップして続ける —</div>
<div id="choices"></div>

<div id="dbg">
  <div id="dbg-badges">
    <span id="b-scroll" class="dbg-badge">スクロール ✗</span>
    <span id="b-tap"    class="dbg-badge">テキスト進行 ✗</span>
    <span id="b-choice" class="dbg-badge">選択肢 ✗</span>
  </div>
  <div id="dbg-log">ページを操作してください...</div>
</div>

<script>
const scenes = [
  { type: 'tap',
    text: '品川の宿場に着いた。江戸の町の喧騒から少し離れ、旅人たちが行き交う通りに立つ。魚売りの声、馬の嘶き、下駄の音が混じり合う。\n\n空は高く晴れ渡り、富士の頂が遠く白く輝いている。東海道の旅は長い。まずは一歩、足を踏み出すのみだ。\n\n旅籠の亭主が声をかけてきた。「お客さん、今夜はどちらへ。品川はよい宿場でございますよ。」' },
  { type: 'choice',
    text: '亭主の言葉に、どう答えるか。',
    choices: ['今夜は泊まる（200文）', 'まだ先へ進む', '値段を交渉する'] },
  { type: 'tap',
    text: '川崎への道を急ぐ。六郷川を渡る渡し船に乗り込むと、川風が心地よく吹き抜けた。\n\n船頭が竿を操り、対岸へ向かう。川面に映る空が揺れている。\n\n対岸に渡ると、川崎宿の入口が見えてきた。' },
  { type: 'choice',
    text: '川崎宿で何をするか。',
    choices: ['川崎大師に参る', '荷物を売りさばく', '先を急ぐ'] },
];

let idx = 0;
let _tapHandler = null;
const hint = document.getElementById('tap-hint');
const choicesEl = document.getElementById('choices');
const logEl = document.getElementById('dbg-log');

function log(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
function setBadge(id, ok, label) {
  const el = document.getElementById(id);
  el.textContent = label + (ok ? ' ✓' : ' ✗');
  el.className = 'dbg-badge' + (ok ? ' ok' : '');
}

function clearTap() {
  if (_tapHandler) {
    document.body.removeEventListener('click', _tapHandler);
    _tapHandler = null;
  }
}
function setTap(fn) {
  clearTap();
  _tapHandler = fn;
  document.body.addEventListener('click', _tapHandler);
}

function renderScene() {
  clearTap();
  const scene = scenes[idx % scenes.length];
  choicesEl.innerHTML = '';
  hint.style.display = 'none';

  const textEl = document.getElementById('scene-text');
  textEl.innerHTML = scene.text.split('\n\n').map(t => `<p>${t}</p>`).join('');
  window.scrollTo(0, 0);

  if (scene.type === 'tap') {
    setTimeout(() => {
      hint.style.display = 'block';
      setTimeout(() => {
        setTap(() => {
          log('body click発火 ✓');
          setBadge('b-tap', true, 'テキスト進行');
          clearTap();
          hint.style.display = 'none';
          idx++;
          renderScene();
        });
      }, 200);
    }, 100);
  } else {
    const nums = ['一、','二、','三、'];
    scene.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = nums[i] + c;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        log('選択肢クリック: ' + c + ' ✓');
        setBadge('b-choice', true, '選択肢');
        idx++;
        renderScene();
      });
      choicesEl.appendChild(btn);
    });
  }
}

window.addEventListener('scroll', () => {
  if (document.getElementById('b-scroll').className.indexOf('ok') === -1) {
    setBadge('b-scroll', true, 'スクロール');
    log('スクロール検知 ✓');
  }
});

renderScene();
log('起動完了');
</script>
</body>
</html>
